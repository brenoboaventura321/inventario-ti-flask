<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Categorias de Ativos</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 40px;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .menu ul {
            list-style: none;
            padding: 0;
        }
        .menu li {
            margin: 15px 0;
        }
        .menu a {
            display: inline-block;
            padding: 12px 24px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .menu a:hover {
            background-color: #2980b9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            background-color: #2c3e50;
            color: white;
            padding: 12px;
            text-align: left;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            color: #333;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        tr:hover {
            background-color: #e8f4f8;
        }
        .voltar a {
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
        }
        .voltar a:hover {
            text-decoration: underline;
        }
        /* Estilização para os formulários de Criar e Editar */
        form label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            color: #2c3e50;
        }
        form input[type="text"], 
        form input[type="number"], 
        form input[type="email"], 
        form select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        form input:disabled {
            background-color: #eee;
            color: #777;
            cursor: not-allowed;
        }
        form button {
            margin-top: 20px;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Categorias de Ativos Computacionais</h1>
    <div class="voltar">
        <a href="/">← Voltar para a Home</a>
    </div>
    <br>
    <table>
        <tr>
            <th>Código</th>
            <th>Nome da Categoria</th>
            <th>Sigla</th>
            <th>Qtd. de Equipamentos</th>
        </tr>
        {% for categoria in categorias %}
            <tr>
                <td>{{ categoria.codigo }}</td>
                <td>{{ categoria.nome }}</td>
                <td>{{ categoria.sigla }}</td>
                <td>{{ categoria.itens|length }}</td>
            </tr>
        {% endfor %}
    </table>
</div>
</body>
</html>
