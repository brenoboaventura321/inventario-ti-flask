<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Novo Ativo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='estilo.css') }}">
</head>
<body>
<div class="container">
    <h1>Cadastrar Ativo de T.I.</h1>
    <div class="voltar">
        <a href="/itens">← Cancelar e Voltar</a>
    </div>
    <br>
    
    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label for="patrimonio"><strong>Nº do Patrimônio (Código Único):</strong></label><br>
            <input type="number" id="patrimonio" name="patrimonio" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label for="nome"><strong>Descrição Completa do Item:</strong></label><br>
            <input type="text" id="nome" name="nome" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label for="valor"><strong>Valor Estimado de Aquisição (R$):</strong></label><br>
            <input type="number" step="0.01" id="valor" name="valor" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label for="responsavel_email"><strong>E-mail do Responsável Técnico:</strong></label><br>
            <input type="email" id="responsavel_email" name="responsavel_email" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label for="localizacao"><strong>Localização Física / Rack:</strong></label><br>
            <input type="text" id="localizacao" name="localizacao" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label for="codigo_cat"><strong>Categoria do Ativo:</strong></label><br>
            <select id="codigo_cat" name="codigo_cat" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;">
                <option value="" disabled selected>Selecione uma categoria...</option>
                {% for categoria in categorias %}
                    <option value="{{ categoria.codigo }}">{{ categoria.nome }} ({{ categoria.sigla }})</option>
                {% endfor %}
            </select>
        </div>
        
        <button type="submit" style="background-color: #3498db; color: white; padding: 12px 24px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px;">
            Adicionar ao Inventário
        </button>
    </form>
</div>
</body>
</html>
