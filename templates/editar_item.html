<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Item</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='estilo.css') }}">
</head>
<body>
<div class="container">
    <h1>Editar Item de Inventário</h1>
    <div class="voltar">
        <a href="/itens">← Cancelar e Voltar</a>
    </div>
    <br>
    
    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label><strong>Nº Patrimônio (Não editável):</strong></label><br>
            <input type="text" value="{{ item.patrimonio }}" disabled style="background:#eee; width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label for="nome"><strong>Descrição do Item:</strong></label><br>
            <input type="text" id="nome" name="nome" value="{{ item.nome }}" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label for="valor"><strong>Valor Estimado (R$):</strong></label><br>
            <input type="number" step="0.01" id="valor" name="valor" value="{{ item.valor }}" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label for="responsavel_email"><strong>E-mail do Responsável:</strong></label><br>
            <input type="email" id="responsavel_email" name="responsavel_email" value="{{ item.responsavel_email }}" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label for="localizacao"><strong>Localização Física:</strong></label><br>
            <input type="text" id="localizacao" name="localizacao" value="{{ item.localizacao }}" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label for="codigo_cat"><strong>Categoria do Ativo:</strong></label><br>
            <select id="codigo_cat" name="codigo_cat" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;">
                {% for categoria in categorias %}
                    <option value="{{ categoria.codigo }}" {% if categoria.codigo == item.codigo_cat %}selected{% endif %}>
                        {{ categoria.nome }} ({{ categoria.sigla }})
                    </option>
                {% endfor %}
            </select>
        </div>
        
        <button type="submit" style="background-color: #2ecc71; color: white; padding: 12px 24px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px;">
            Salvar Alterações
        </button>
    </form>
</div>
</body>
</html>
